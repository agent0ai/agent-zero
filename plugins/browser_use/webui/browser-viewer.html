<html>
<head>
  <title>Browser Viewer</title>
  <script type="module">
    import { store } from "/plugins/browser_use/webui/browser-viewer-store.js";
  </script>
</head>
<body>
  <div x-data x-create="$store.browserViewer.open($refs.screenCanvas)" x-destroy="$store.browserViewer.destroy()">
    <template x-if="$store.browserViewer">
      <div class="browser-viewer">

        <!-- Error Banner -->
        <div class="bv-error" x-show="$store.browserViewer.error" x-cloak>
          <span class="material-symbols-outlined">error</span>
          <span x-text="$store.browserViewer.error"></span>
          <button class="bv-error-dismiss" @click="$store.browserViewer.error = null">&times;</button>
        </div>

        <!-- URL Bar -->
        <div class="bv-url-bar">
          <span class="bv-status-dot" :class="$store.browserViewer.alive ? 'alive' : 'dead'"></span>
          <input
            type="text"
            class="bv-url-input"
            placeholder="Enter URL..."
            x-model="$store.browserViewer.currentUrl"
            @keydown.enter="$store.browserViewer.navigate($store.browserViewer.currentUrl)"
          />
          <button class="btn btn-ok bv-go-btn" @click="$store.browserViewer.navigate($store.browserViewer.currentUrl)">Go</button>
        </div>

        <!-- Canvas Wrapper -->
        <div class="bv-canvas-wrapper">
          <canvas x-ref="screenCanvas"></canvas>

          <!-- Agent busy overlay -->
          <div class="bv-busy-overlay" x-show="$store.browserViewer.agentBusy" x-cloak>
            <div class="bv-busy-content">
              <div class="bv-busy-spinner"></div>
              <span>Agent is working...</span>
            </div>
          </div>

          <!-- Placeholder when not connected -->
          <div class="bv-placeholder" x-show="!$store.browserViewer.connected && !$store.browserViewer.error" x-cloak>
            <div class="bv-placeholder-content">
              <span class="material-symbols-outlined bv-placeholder-icon">language</span>
              <span>Starting browser...</span>
            </div>
          </div>
        </div>

      </div>
    </template>

    <!-- Footer (outside template x-if so it exists immediately for modals.js) -->
    <template x-if="$store.browserViewer">
      <div class="modal-footer" data-modal-footer>
        <span class="bv-footer-title" x-text="$store.browserViewer.currentTitle || 'No page loaded'"></span>
        <div class="bv-footer-actions">
          <button class="btn btn-ok" @click="$store.browserViewer.takeScreenshot()">
            <span class="material-symbols-outlined">photo_camera</span>
            Screenshot
          </button>
          <button class="btn btn-cancel" @click="$store.browserViewer.closeBrowser(); window.closeModal('../plugins/browser_use/webui/browser-viewer.html')">
            <span class="material-symbols-outlined">close</span>
            Close Browser
          </button>
        </div>
      </div>
    </template>
  </div>

  <style>
    [x-cloak] { display: none !important; }

    .browser-viewer {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 400px;
    }

    /* Error banner */
    .bv-error {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 8px;
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.3);
      border-radius: 6px;
      color: #dc3545;
      font-size: var(--font-size-small);
    }

    .bv-error .material-symbols-outlined {
      font-size: 18px;
      flex-shrink: 0;
    }

    .bv-error-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      color: inherit;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0.7;
    }

    .bv-error-dismiss:hover {
      opacity: 1;
    }

    /* URL bar */
    .bv-url-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 8px;
      background: var(--color-input);
      border: 1px solid var(--color-border);
      border-radius: 8px;
    }

    .bv-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background-color 0.3s;
    }

    .bv-status-dot.alive {
      background: #22c55e;
      box-shadow: 0 0 4px rgba(34, 197, 94, 0.5);
    }

    .bv-status-dot.dead {
      background: #ef4444;
      box-shadow: 0 0 4px rgba(239, 68, 68, 0.4);
    }

    .bv-url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--color-text);
      font-size: var(--font-size-small);
      font-family: 'Roboto Mono', monospace;
      padding: 4px 0;
    }

    .bv-go-btn {
      padding: 4px 14px;
      font-size: var(--font-size-small);
    }

    /* Canvas wrapper */
    .bv-canvas-wrapper {
      position: relative;
      flex: 1;
      min-height: 300px;
      background: var(--color-input);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bv-canvas-wrapper canvas {
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
    }

    /* Agent busy overlay */
    .bv-busy-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      border-radius: 8px;
    }

    .bv-busy-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: var(--font-size-small);
    }

    .bv-busy-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top: 3px solid #fff;
      border-radius: 50%;
      animation: bv-spin 1s linear infinite;
    }

    @keyframes bv-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Placeholder */
    .bv-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bv-placeholder-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--color-text);
      opacity: 0.5;
    }

    .bv-placeholder-icon {
      font-size: 48px;
    }

    /* Footer */
    .bv-footer-title {
      flex: 1;
      font-size: var(--font-size-small);
      color: var(--color-text);
      opacity: 0.7;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .bv-footer-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .bv-footer-actions .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .bv-footer-actions .material-symbols-outlined {
      font-size: 18px;
    }

    .modal-footer {
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</body>
</html>
