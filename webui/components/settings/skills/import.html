<html>
<head>
    <title>Install Skills</title>
    <script type="module">
        import { store } from "/components/settings/skills/skills-install-store.js";
    </script>
</head>
<body>
    <div x-data>
        <template x-if="$store.skillsInstallStore">
            <div>
                <h3>Install Skills from GitHub</h3>

                <div class="install-section">
                    <div class="install-input-row">
                        <input type="text" class="install-input" placeholder="owner/repo or owner/repo/skill-name"
                            x-model="$store.skillsInstallStore.source"
                            @keydown.enter="$store.skillsInstallStore.install()">
                        <button class="btn slim primary" @click="$store.skillsInstallStore.install()"
                            :disabled="$store.skillsInstallStore.loading || !$store.skillsInstallStore.source.trim()">
                            <span x-show="!$store.skillsInstallStore.loading">Install</span>
                            <span x-show="$store.skillsInstallStore.loading">Installing...</span>
                        </button>
                    </div>
                    <div class="install-hint">
                        Accepts <code>owner/repo</code>, <code>owner/repo/skill-name</code>,
                        or a full <code>skills.sh</code> URL. Skills are installed into the
                        current project if one is active, otherwise globally.
                    </div>
                </div>

                <div x-show="$store.skillsInstallStore.error" class="error">
                    <span x-text="$store.skillsInstallStore.error"></span>
                </div>

                <div x-show="$store.skillsInstallStore.result" class="result">
                    <h4>Install Complete</h4>
                    <div class="result-meta">
                        <div>Source: <code x-text="$store.skillsInstallStore.result?.source"></code></div>
                        <div>Target: <code x-text="$store.skillsInstallStore.result?.target"></code></div>
                        <div>Installed: <span x-text="$store.skillsInstallStore.result?.installed?.length || 0"></span></div>
                        <div x-show="($store.skillsInstallStore.result?.skipped?.length || 0) > 0">
                            Skipped: <span x-text="$store.skillsInstallStore.result?.skipped?.length || 0"></span>
                        </div>
                    </div>
                    <template x-if="$store.skillsInstallStore.result?.installed?.length > 0">
                        <ul class="skill-list">
                            <template x-for="name in $store.skillsInstallStore.result.installed" :key="name">
                                <li x-text="name"></li>
                            </template>
                        </ul>
                    </template>
                    <div class="note">
                        Skills are indexed automatically. If you don't see them immediately, restart the agent.
                    </div>
                </div>

                <div class="slash-hint">
                    <strong>Tip:</strong> You can also type <code>/skill-install owner/repo</code> directly in the chat.
                </div>
            </div>
        </template>
    </div>

    <style>
        .install-section {
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            background: var(--color-input);
        }

        .install-input-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .install-input {
            flex: 1;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: "Roboto Mono", monospace;
            font-size: 0.85rem;
        }

        .install-input:focus {
            outline: 1px solid rgba(155, 155, 155, 0.5);
        }

        .install-hint {
            margin-top: 0.6rem;
            font-size: 0.82rem;
            color: var(--color-secondary);
            line-height: 1.4;
        }

        .install-hint code {
            font-size: 0.8rem;
            background: var(--color-bg-primary);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }

        .error {
            color: var(--color-error);
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: var(--color-error-bg);
            border-radius: 6px;
        }

        .result {
            margin-top: 1rem;
            padding: 0.75rem;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            border-radius: 6px;
        }

        .result-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.25rem 1rem;
            margin-bottom: 0.5rem;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .result-meta code {
            font-size: 0.82rem;
        }

        .skill-list {
            margin: 0.5rem 0;
            padding-left: 1.2rem;
            font-size: 0.88rem;
        }

        .note {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .slash-hint {
            margin-top: 1.25rem;
            font-size: 0.82rem;
            color: var(--color-text-secondary);
            opacity: 0.7;
        }

        .slash-hint code {
            font-size: 0.8rem;
            background: var(--color-input);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
        }
    </style>
</body>
</html>
