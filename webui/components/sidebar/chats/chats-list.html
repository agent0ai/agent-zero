<html>

<head>
  <script type="module">
    import { store } from "/components/sidebar/chats/chats-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.chats">
      <div class="chats-list-container" x-data="{ chatSearch: '' }">
        <div class="section-header-row">
          <h3 class="section-header">Chats</h3>
          <!-- New Chat Button -->
          <button id="newChat" class="btn-icon-action chat-list-action-btn" @click="$store.chats.newChat()" aria-label="New Chat" title="New Chat" data-bs-placement="top" data-bs-trigger="hover">
            <span class="material-symbols-outlined">edit_square</span>
          </button>
        </div>

        <!-- Chat Search Input -->
        <div class="chat-search-wrapper" x-show="$store.chats.contexts.length > 0">
          <span class="material-symbols-outlined chat-search-icon">search</span>
          <input
            type="text"
            class="chat-search-input"
            placeholder="Filter chats..."
            x-model="chatSearch"
            @keydown.escape="chatSearch = ''"
            aria-label="Filter chats"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="chat-search-clear" x-show="chatSearch.length > 0" @click="chatSearch = ''" title="Clear search" aria-label="Clear search">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <ul class="config-list chats-config-list no-scrollbar" x-show="$store.chats.contexts.length > 0">
          <template x-for="context in $store.chats.contexts.filter(c => !chatSearch || (c.name || ('Chat #' + c.no)).toLowerCase().includes(chatSearch.toLowerCase()))" :key="context.id">
            <li>
              <div :class="{'chat-container': true, 'chat-selected': context.id === $store.chats.selected}"
                @click="$store.chats.selectChat(context.id)">
                <div class="chat-list-button">
                  <span :class="{'project-color-ball': true, 'heartbeat': context.running}"
                    :style="context.project?.color ? { backgroundColor: context.project.color } : { border: '1px solid var(--color-border)' }"></span>
                  <span class="chat-name"
                    x-text="context.name ? context.name : 'Chat #' + context.no"></span>
                </div>
                <button class="btn-icon-action chat-list-action-btn" title="Close chat" @click.stop="$confirmClick($event, () => $store.chats.killChat(context.id))">
                  <span class="material-symbols-outlined">close</span>
                </button>
              </div>
            </li>
          </template>
          <!-- No results message -->
          <li x-show="chatSearch && $store.chats.contexts.filter(c => (c.name || ('Chat #' + c.no)).toLowerCase().includes(chatSearch.toLowerCase())).length === 0">
            <div class="chat-search-no-results">No chats match "<span x-text="chatSearch"></span>"</div>
          </li>
        </ul>
        <div class="empty-list-message" x-show="$store.chats.contexts.length === 0">
          <p><i>No chats to list.</i></p>
        </div>
      </div>
    </template>
  </div>

  <style>
    .chats-list-container .section-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      flex-shrink: 0;
      margin-bottom: var(--spacing-xs);
      z-index: 10;
    }

    .chats-list-container .section-header {
      margin: 0;
    }

    /* Chats list container and items */
    .chats-list-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-top: var(--spacing-md);
    }

    .chats-config-list {
      flex: 1;
      min-height: 0;
      overflow: scroll;
      scroll-behavior: smooth;
      max-height: 100%;
    }

    .chat-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 40px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }

    .chat-list-button {
      display: flex;
      align-items: center;
      flex-grow: 1;
      padding: 8px;
      overflow: hidden;
      gap: 0.5em;
    }

    .project-color-ball {
      width: 0.6em;
      height: 0.6em;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .chat-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: var(--font-size-small);
    }

    .chat-list-action-btn {
      flex-shrink: 0;
      margin-right: 8px;
    }

    .chat-container:hover{
      background-color: var(--color-background-hover);
    }

    .device-pointer .chat-container .chat-list-action-btn {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0s;
    }

    .device-pointer .chat-container:hover .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .device-touch .chats-list-container .chat-list-action-btn {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .empty-list-message {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
      color: var(--color-secondary);
      text-align: center;
      opacity: 0.7;
      font-style: italic;
    }

    .light-mode .empty-list-message {
      color: var(--color-secondary-light);
    }

    /* Selected chat accent */
    .chat-selected .chat-name {
      font-size: var(--font-size-normal);
      font-weight: bold;
    }

    /* Chat Search */
    .chat-search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      margin-bottom: var(--spacing-xs);
      flex-shrink: 0;
    }

    .chat-search-icon {
      position: absolute;
      left: 8px;
      font-size: 16px;
      color: var(--color-text);
      opacity: 0.4;
      pointer-events: none;
      user-select: none;
    }

    .chat-search-input {
      width: 100%;
      background-color: var(--color-input);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text);
      font-family: var(--font-family-main);
      font-size: var(--font-size-small);
      padding: 6px 28px 6px 30px;
      outline: none;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    .chat-search-input:focus {
      border-color: var(--color-primary);
      background-color: var(--color-input-focus);
    }

    .chat-search-input::placeholder {
      color: var(--color-text);
      opacity: 0.4;
    }

    .chat-search-clear {
      position: absolute;
      right: 4px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--color-text);
      opacity: 0.4;
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 4px;
      transition: opacity 0.2s ease;
    }

    .chat-search-clear:hover {
      opacity: 0.8;
    }

    .chat-search-clear .material-symbols-outlined {
      font-size: 14px;
    }

    .chat-search-no-results {
      padding: 12px 8px;
      font-size: var(--font-size-small);
      color: var(--color-text);
      opacity: 0.5;
      text-align: center;
      font-style: italic;
    }

    /* .chat-list-button.font-bold { position: relative; background-color: var(--color-border) 0.05; } */
    /* .chat-list-button.font-bold::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 3px; background-color: var(--color-border); border-top-left-radius: 3px; border-bottom-left-radius: 3px; } */
    /* .light-mode .chat-list-button.font-bold { background-color: var(--color-border) 0.05; } */
    /* .light-mode .chat-list-button.font-bold::before { background-color: var(--color-border); } */
  </style>
</body>

</html>
