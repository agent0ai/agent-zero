<!-- Portfolio Panel - Combined customer_lifecycle and portfolio_manager view -->
<div class="portfolio-panel" x-data="portfolioPanelData()" x-init="init()">
    <div class="panel-header">
        <h3>Portfolio</h3>
        <div class="panel-actions">
            <button class="btn-sm" @click="refresh()" :disabled="loading">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" x-text="stats.customers || 0"></div>
            <div class="stat-label">Customers</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.projects || 0"></div>
            <div class="stat-label">Projects</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.active || 0"></div>
            <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="formatCurrency(stats.pipeline_value)"></div>
            <div class="stat-label">Pipeline</div>
        </div>
    </div>

    <!-- Recent Customers -->
    <div class="customers-section" x-show="customers.length > 0">
        <h4>Recent Customers</h4>
        <div class="customer-list">
            <template x-for="customer in customers.slice(0, 4)" :key="customer.customer_id">
                <div class="customer-card">
                    <div class="customer-name" x-text="customer.name"></div>
                    <div class="customer-stage">
                        <span class="stage-badge" :class="'stage-' + customer.stage" x-text="customer.stage"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Recent Projects -->
    <div class="projects-section" x-show="projects.length > 0">
        <h4>Recent Projects</h4>
        <div class="project-list">
            <template x-for="project in projects.slice(0, 3)" :key="project.product_id">
                <div class="project-card">
                    <div class="project-name" x-text="project.name"></div>
                    <div class="project-status">
                        <span class="status-badge" :class="'status-' + project.status" x-text="project.status"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="empty-state" x-show="!loading && customers.length === 0 && projects.length === 0">
        No customers or projects yet. Use customer_lifecycle or portfolio_manager tools to create them.
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="action-btn" @click="sendChat('{{customer_lifecycle(action=\"list_customers\")}}')">
            View Customers
        </button>
        <button class="action-btn" @click="sendChat('{{portfolio_manager_tool(action=\"list_products\")}}')">
            View Projects
        </button>
    </div>
</div>

<script>
function portfolioPanelData() {
    return {
        loading: false,
        stats: {},
        customers: [],
        projects: [],

        async init() {
            await this.refresh();
        },

        async refresh() {
            this.loading = true;
            try {
                // Load from both customer_lifecycle and portfolio_manager
                // These are tool-based, so we just show placeholder data
                // Real implementation would need API endpoints

                // Placeholder stats
                this.stats = {
                    customers: this.customers.length,
                    projects: this.projects.length,
                    active: 0,
                    pipeline_value: 0
                };
            } catch (e) {
                console.error('Error loading portfolio:', e);
            } finally {
                this.loading = false;
            }
        },

        formatCurrency(value) {
            if (!value) return '$0';
            if (value >= 1000000) return '$' + (value / 1000000).toFixed(1) + 'M';
            if (value >= 1000) return '$' + (value / 1000).toFixed(0) + 'K';
            return '$' + value;
        },

        sendChat(message) {
            // Send message to chat
            const chatInput = document.querySelector('#chat-input textarea, #msg');
            if (chatInput) {
                chatInput.value = message;
                chatInput.dispatchEvent(new Event('input', { bubbles: true }));
                // Try to submit
                const form = chatInput.closest('form');
                if (form) form.dispatchEvent(new Event('submit'));
            }
            Alpine.store('tileRowStore')?.collapseTile();
        }
    };
}
</script>
