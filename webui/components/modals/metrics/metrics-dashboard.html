<html>

<head>
    <title>Metrics Dashboard</title>
    <script type="module">
        import { store } from "/components/modals/metrics/metrics-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.metricsDashboard">
            <div x-create="$store.metricsDashboard.onOpen()" x-destroy="$store.metricsDashboard.cleanup()"
                class="metrics-dashboard">

                <!-- Tabs -->
                <div class="metrics-tabs">
                    <button class="metrics-tab" :class="{ active: $store.metricsDashboard.activeTab === 'overview' }"
                        @click="$store.metricsDashboard.switchTab('overview')">
                        <span class="material-symbols-outlined">dashboard</span> Overview
                    </button>
                    <button class="metrics-tab"
                        :class="{ active: $store.metricsDashboard.activeTab === 'performance' }"
                        @click="$store.metricsDashboard.switchTab('performance')">
                        <span class="material-symbols-outlined">speed</span> Performance
                    </button>
                    <button class="metrics-tab" :class="{ active: $store.metricsDashboard.activeTab === 'models' }"
                        @click="$store.metricsDashboard.switchTab('models')">
                        <span class="material-symbols-outlined">model_training</span> By Model
                    </button>
                    <button class="metrics-tab" :class="{ active: $store.metricsDashboard.activeTab === 'feed' }"
                        @click="$store.metricsDashboard.switchTab('feed')">
                        <span class="material-symbols-outlined">list_alt</span> Live Feed
                    </button>

                    <div class="metrics-tabs-right">
                        <span class="metrics-uptime" x-show="$store.metricsDashboard.uptimeSeconds > 0">
                            Uptime: <strong x-text="$store.metricsDashboard.fmtUptime($store.metricsDashboard.uptimeSeconds)"></strong>
                        </span>
                        <button class="btn btn-sm btn-danger" @click="$confirmClick($event, () => $store.metricsDashboard.clearMetrics())" title="Clear all metrics">
                            <span class="material-symbols-outlined" style="font-size:16px">delete</span>
                        </button>
                    </div>
                </div>

                <!-- Loading / Error -->
                <div x-show="$store.metricsDashboard.loading && $store.metricsDashboard.totalCalls === 0"
                    class="metrics-loading">Loading metrics...</div>
                <div x-show="$store.metricsDashboard.error" class="metrics-error"
                    x-text="$store.metricsDashboard.error"></div>

                <!-- No data state -->
                <div x-show="!$store.metricsDashboard.loading && $store.metricsDashboard.totalCalls === 0 && !$store.metricsDashboard.error"
                    class="metrics-empty">
                    <span class="material-symbols-outlined" style="font-size:48px;opacity:0.3">monitoring</span>
                    <p>No metrics collected yet. Metrics will appear here as LLM calls are made.</p>
                </div>

                <!-- OVERVIEW TAB -->
                <div x-show="$store.metricsDashboard.activeTab === 'overview' && $store.metricsDashboard.totalCalls > 0"
                    class="metrics-content">

                    <!-- KPI Cards -->
                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-label">Total Calls</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtNum($store.metricsDashboard.totalCalls)"></div>
                            <div class="kpi-sub">
                                <span class="kpi-success" x-text="$store.metricsDashboard.successCalls + ' ok'"></span> /
                                <span class="kpi-fail" x-text="$store.metricsDashboard.failedCalls + ' err'"></span>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">Success Rate</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.successRate()"></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">Tokens In</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtNum($store.metricsDashboard.totalTokensIn)"></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">Tokens Out</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtNum($store.metricsDashboard.totalTokensOut)"></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">Avg Latency</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.fmtLatency($store.metricsDashboard.avgLatency)"></div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">Buffer</div>
                            <div class="kpi-value" x-text="$store.metricsDashboard.bufferSize + '/' + $store.metricsDashboard.bufferCapacity"></div>
                        </div>
                    </div>

                    <!-- Timeline sparkline -->
                    <div class="metrics-section" x-show="$store.metricsDashboard.timeline.length > 1">
                        <h3>Activity (last 60 min)</h3>
                        <div class="sparkline-container">
                            <svg viewBox="0 0 600 80" preserveAspectRatio="none" class="sparkline-svg">
                                <path :d="$store.metricsDashboard.sparklinePath($store.metricsDashboard.timeline, 'calls', 600, 70)"
                                    fill="none" stroke="var(--color-accent, #60a5fa)" stroke-width="2" />
                                <path :d="$store.metricsDashboard.sparklinePath($store.metricsDashboard.timeline, 'errors', 600, 70)"
                                    fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" />
                            </svg>
                            <div class="sparkline-legend">
                                <span><span class="legend-line accent"></span> Calls</span>
                                <span><span class="legend-line error"></span> Errors</span>
                            </div>
                        </div>
                    </div>

                    <!-- Recent errors -->
                    <div class="metrics-section" x-show="$store.metricsDashboard.recentErrors.length > 0">
                        <h3>Recent Errors</h3>
                        <div class="errors-list">
                            <template x-for="err in $store.metricsDashboard.recentErrors.slice(0, 5)" :key="err.timestamp">
                                <div class="error-item">
                                    <span class="error-model" x-text="err.model"></span>
                                    <span class="error-msg" x-text="err.error"></span>
                                    <span class="error-time" x-text="$store.metricsDashboard.fmtTime(err.timestamp)"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- PERFORMANCE TAB -->
                <div x-show="$store.metricsDashboard.activeTab === 'performance' && $store.metricsDashboard.totalCalls > 0"
                    class="metrics-content">
                    <div class="perf-grid">
                        <div class="perf-card">
                            <div class="perf-label">P50 Latency</div>
                            <div class="perf-value" x-text="$store.metricsDashboard.fmtLatency($store.metricsDashboard.p50Latency)"></div>
                        </div>
                        <div class="perf-card">
                            <div class="perf-label">P95 Latency</div>
                            <div class="perf-value" x-text="$store.metricsDashboard.fmtLatency($store.metricsDashboard.p95Latency)"></div>
                        </div>
                        <div class="perf-card">
                            <div class="perf-label">P99 Latency</div>
                            <div class="perf-value" x-text="$store.metricsDashboard.fmtLatency($store.metricsDashboard.p99Latency)"></div>
                        </div>
                        <div class="perf-card">
                            <div class="perf-label">Avg Latency</div>
                            <div class="perf-value" x-text="$store.metricsDashboard.fmtLatency($store.metricsDashboard.avgLatency)"></div>
                        </div>
                    </div>

                    <!-- Per-model latency breakdown -->
                    <div class="metrics-section" x-show="$store.metricsDashboard.byModel.length > 0">
                        <h3>Latency by Model</h3>
                        <div class="model-bars">
                            <template x-for="m in $store.metricsDashboard.byModel" :key="m.model">
                                <div class="model-bar-row">
                                    <span class="model-bar-name" x-text="m.model"></span>
                                    <div class="model-bar-track">
                                        <div class="model-bar-fill"
                                            :style="'width:' + Math.min(100, (m.avg_latency_ms / Math.max(...$store.metricsDashboard.byModel.map(x=>x.avg_latency_ms), 1)) * 100) + '%'">
                                        </div>
                                    </div>
                                    <span class="model-bar-val" x-text="$store.metricsDashboard.fmtLatency(m.avg_latency_ms)"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- BY MODEL TAB -->
                <div x-show="$store.metricsDashboard.activeTab === 'models' && $store.metricsDashboard.totalCalls > 0"
                    class="metrics-content">
                    <div class="model-table-wrap">
                        <table class="model-table">
                            <thead>
                                <tr>
                                    <th>Model</th>
                                    <th>Calls</th>
                                    <th>OK</th>
                                    <th>Err</th>
                                    <th>Tokens In</th>
                                    <th>Tokens Out</th>
                                    <th>Avg Latency</th>
                                    <th>Retries</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in $store.metricsDashboard.byModel" :key="m.model">
                                    <tr>
                                        <td class="model-name-cell" x-text="m.model"></td>
                                        <td x-text="m.calls"></td>
                                        <td class="cell-ok" x-text="m.success"></td>
                                        <td class="cell-err" x-text="m.failed"></td>
                                        <td x-text="$store.metricsDashboard.fmtNum(m.tokens_in)"></td>
                                        <td x-text="$store.metricsDashboard.fmtNum(m.tokens_out)"></td>
                                        <td x-text="$store.metricsDashboard.fmtLatency(m.avg_latency_ms)"></td>
                                        <td x-text="m.retries"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- LIVE FEED TAB -->
                <div x-show="$store.metricsDashboard.activeTab === 'feed' && $store.metricsDashboard.totalCalls > 0"
                    class="metrics-content">
                    <div class="feed-list">
                        <template x-for="(ev, idx) in $store.metricsDashboard.recentEvents" :key="idx">
                            <div class="feed-item" :class="{ 'feed-error': !ev.success }">
                                <span class="feed-status">
                                    <span class="material-symbols-outlined" x-text="ev.success ? 'check_circle' : 'error'"
                                        :style="'color:' + (ev.success ? 'var(--color-ok, #22c55e)' : '#ef4444') + ';font-size:16px'"></span>
                                </span>
                                <span class="feed-model" x-text="ev.model"></span>
                                <span class="feed-tokens">
                                    <span x-text="$store.metricsDashboard.fmtNum(ev.tokens_in)"></span>→<span x-text="$store.metricsDashboard.fmtNum(ev.tokens_out)"></span>
                                </span>
                                <span class="feed-latency" x-text="$store.metricsDashboard.fmtLatency(ev.latency_ms)"></span>
                                <span class="feed-attempts" x-show="ev.attempts > 1" x-text="'×' + ev.attempts"></span>
                                <span class="feed-time" x-text="$store.metricsDashboard.fmtTime(ev.timestamp)"></span>
                                <span class="feed-err-msg" x-show="ev.error" x-text="ev.error" title="Error details"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>

<style>
    .metrics-dashboard {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-md, 16px);
        min-height: 400px;
    }

    /* Tabs */
    .metrics-tabs {
        display: flex;
        gap: 4px;
        border-bottom: 1px solid var(--color-border, #333);
        padding-bottom: 8px;
        flex-wrap: wrap;
        align-items: center;
    }
    .metrics-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border: none;
        background: transparent;
        color: var(--color-text-secondary, #888);
        cursor: pointer;
        border-radius: 6px 6px 0 0;
        font-size: 13px;
        transition: all 0.15s;
    }
    .metrics-tab .material-symbols-outlined { font-size: 18px; }
    .metrics-tab:hover { background: var(--color-background-hover, #222); color: var(--color-text, #eee); }
    .metrics-tab.active {
        background: var(--color-panel, #1a1a2e);
        color: var(--color-text, #eee);
        border-bottom: 2px solid var(--color-accent, #60a5fa);
    }
    .metrics-tabs-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: var(--color-text-secondary, #888);
    }

    /* States */
    .metrics-loading, .metrics-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 60px 20px;
        color: var(--color-text-secondary, #888);
        text-align: center;
    }
    .metrics-error {
        padding: 10px 14px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        color: #ef4444;
        font-size: 13px;
    }

    /* KPI Grid */
    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }
    .kpi-card {
        background: var(--color-panel, #1a1a2e);
        border: 1px solid var(--color-border, #333);
        border-radius: 10px;
        padding: 16px;
        text-align: center;
    }
    .kpi-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-text-secondary, #888);
        margin-bottom: 6px;
    }
    .kpi-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--color-text, #eee);
        line-height: 1.1;
    }
    .kpi-sub {
        font-size: 12px;
        margin-top: 4px;
        color: var(--color-text-secondary, #888);
    }
    .kpi-success { color: var(--color-ok, #22c55e); }
    .kpi-fail { color: #ef4444; }

    /* Sections */
    .metrics-section { margin-top: 8px; }
    .metrics-section h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--color-text, #eee);
        margin-bottom: 10px;
    }

    /* Sparkline */
    .sparkline-container {
        background: var(--color-panel, #1a1a2e);
        border: 1px solid var(--color-border, #333);
        border-radius: 10px;
        padding: 14px 16px 8px;
    }
    .sparkline-svg { width: 100%; height: 70px; }
    .sparkline-legend {
        display: flex;
        gap: 16px;
        font-size: 11px;
        color: var(--color-text-secondary, #888);
        padding-top: 6px;
    }
    .legend-line {
        display: inline-block;
        width: 18px;
        height: 2px;
        vertical-align: middle;
        margin-right: 4px;
    }
    .legend-line.accent { background: var(--color-accent, #60a5fa); }
    .legend-line.error { background: #ef4444; border-top: 1px dashed #ef4444; height: 0; }

    /* Errors list */
    .errors-list { display: flex; flex-direction: column; gap: 6px; }
    .error-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        padding: 8px 12px;
        background: rgba(239, 68, 68, 0.06);
        border-radius: 6px;
        border: 1px solid rgba(239, 68, 68, 0.15);
    }
    .error-model {
        font-weight: 600;
        color: var(--color-text, #eee);
        white-space: nowrap;
    }
    .error-msg {
        flex: 1;
        color: #ef4444;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .error-time { color: var(--color-text-secondary, #888); white-space: nowrap; }

    /* Performance */
    .perf-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }
    .perf-card {
        background: var(--color-panel, #1a1a2e);
        border: 1px solid var(--color-border, #333);
        border-radius: 10px;
        padding: 20px;
        text-align: center;
    }
    .perf-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-text-secondary, #888);
        margin-bottom: 8px;
    }
    .perf-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--color-text, #eee);
    }

    /* Model bars */
    .model-bars { display: flex; flex-direction: column; gap: 8px; }
    .model-bar-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .model-bar-name {
        width: 200px;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--color-text, #eee);
        flex-shrink: 0;
    }
    .model-bar-track {
        flex: 1;
        height: 8px;
        background: var(--color-border, #333);
        border-radius: 4px;
        overflow: hidden;
    }
    .model-bar-fill {
        height: 100%;
        background: var(--color-accent, #60a5fa);
        border-radius: 4px;
        transition: width 0.3s;
    }
    .model-bar-val {
        width: 60px;
        font-size: 12px;
        color: var(--color-text-secondary, #888);
        flex-shrink: 0;
    }

    /* Model table */
    .model-table-wrap { overflow-x: auto; }
    .model-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
    }
    .model-table th {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 2px solid var(--color-border, #333);
        color: var(--color-text-secondary, #888);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .model-table td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--color-border, #222);
        color: var(--color-text, #eee);
    }
    .model-name-cell {
        font-weight: 600;
        max-width: 250px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .cell-ok { color: var(--color-ok, #22c55e); }
    .cell-err { color: #ef4444; }

    /* Live feed */
    .feed-list { display: flex; flex-direction: column; gap: 4px; }
    .feed-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 12px;
        background: var(--color-panel, #1a1a2e);
        border: 1px solid var(--color-border, #222);
        border-radius: 6px;
        font-size: 12px;
    }
    .feed-item.feed-error {
        border-color: rgba(239, 68, 68, 0.25);
        background: rgba(239, 68, 68, 0.04);
    }
    .feed-model {
        font-weight: 600;
        color: var(--color-text, #eee);
        min-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .feed-tokens { color: var(--color-text-secondary, #888); white-space: nowrap; }
    .feed-latency { color: var(--color-accent, #60a5fa); white-space: nowrap; }
    .feed-attempts { color: #f59e0b; font-weight: 600; }
    .feed-time { color: var(--color-text-secondary, #666); white-space: nowrap; margin-left: auto; }
    .feed-err-msg {
        color: #ef4444;
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 200px;
    }

    /* Responsive */
    @media (max-width: 600px) {
        .kpi-grid, .perf-grid { grid-template-columns: repeat(2, 1fr); }
        .model-bar-name { width: 100px; font-size: 11px; }
        .feed-model { min-width: 80px; }
        .feed-err-msg { display: none; }
    }
</style>

</html>
