<html>
<head>
    <title>Deimos OpenBao Secrets</title>
</head>
<body>
    <div x-data>
        <template x-if="config">
            <div>
                <div class="section-title">
                    <a href="https://deimosai.com/agentic-organisation" target="_blank"
                       style="text-decoration:none; margin-right:6px;" title="Deimos Agentic Organisation">
                        &#127760;
                    </a>
                    Deimos OpenBao Plugin Settings
                </div>
                <div class="section-description">
                    Replaces Agent Zero's secrets management with <a href="https://openbao.org" target="_blank">OpenBao</a> KV v2.
                    Credentials should be set as <strong>Docker environment variables</strong>
                    (e.g., <code>-e OPENBAO_TOKEN=...</code> in your <code>docker-compose.yml</code>).
                </div>

                <!-- Enable / Disable -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Enable OpenBao Backend</div>
                        <div class="field-description">
                            When enabled, all secrets are sourced from OpenBao instead of <code>.env</code> files.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- URL -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">OpenBao URL</div>
                        <div class="field-description">
                            Full URL to your OpenBao server including protocol and port.
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.url" placeholder="http://127.0.0.1:8200" />
                    </div>
                </div>

                <!-- Auth Method -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Authentication Method</div>
                        <div class="field-description">
                            <b>AppRole</b> (recommended): Machine-to-machine auth for production. Set <code>OPENBAO_ROLE_ID</code> and <code>OPENBAO_SECRET_ID</code> as Docker env vars.<br>
                            <b>Token</b> (dev only): Direct token auth. Set <code>OPENBAO_TOKEN</code> as Docker env var.
                        </div>
                    </div>
                    <div class="field-control">
                        <select x-model="config.auth_method">
                            <option value="approle">AppRole (recommended)</option>
                            <option value="token">Token (dev only)</option>
                        </select>
                    </div>
                </div>

                <!-- Mount Point -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Mount Point</div>
                        <div class="field-description">
                            The KV v2 secrets engine mount path &mdash; the "volume" where your secrets engine lives.
                            Most installations use <code>secret</code>.
                            <br><em>Enable with:</em> <code>bao secrets enable -path=secret kv-v2</code>
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.mount_point" placeholder="secret" />
                    </div>
                </div>

                <!-- Secrets Path -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Secrets Path</div>
                        <div class="field-description">
                            KV path within the mount where A0 secrets are stored as key-value pairs.
                            <br><em>Write secrets:</em> <code>bao kv put secret/<b>agentzero</b> API_KEY=sk-...</code>
                            <br><em>Multi-env:</em> <code>agentzero/prod</code>, <code>agentzero/staging</code>
                        </div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.secrets_path" placeholder="agentzero" />
                    </div>
                </div>

                <!-- Fallback to .env -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Fallback to .env Files</div>
                        <div class="field-description">
                            When enabled, falls back to <code>.env</code> files if OpenBao is unreachable.
                            Disable for strict mode &mdash; secrets <em>only</em> from OpenBao.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.fallback_to_env" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- TLS -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Verify TLS Certificates</div>
                        <div class="field-description">Disable only for development.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.tls_verify" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">CA Certificate Path</div>
                        <div class="field-description">Custom CA bundle. Leave empty for system defaults.</div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.tls_ca_cert" placeholder="/path/to/ca-bundle.crt" />
                    </div>
                </div>

                <!-- Tuning -->
                <div class="field">
                    <div class="field-label"><div class="field-title">HTTP Timeout (seconds)</div></div>
                    <div class="field-control">
                        <input type="number" min="1" max="120" step="0.5" x-model.number="config.timeout" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Cache TTL (seconds)</div>
                        <div class="field-description">How long to cache secrets. 0 = no caching.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="0" max="3600" x-model.number="config.cache_ttl" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label"><div class="field-title">Retry Attempts</div></div>
                    <div class="field-control">
                        <input type="number" min="0" max="10" x-model.number="config.retry_attempts" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label"><div class="field-title">Circuit Breaker Threshold</div></div>
                    <div class="field-control">
                        <input type="number" min="1" max="50" x-model.number="config.circuit_breaker_threshold" />
                    </div>
                </div>
                <div class="field">
                    <div class="field-label"><div class="field-title">Circuit Breaker Recovery (s)</div></div>
                    <div class="field-control">
                        <input type="number" min="5" max="600" x-model.number="config.circuit_breaker_recovery" />
                    </div>
                </div>

                <!-- Test Connection -->
                <div class="field" x-data="{ testResult: ''  }">
                    <div class="field-label">
                        <div class="field-title">Connection Test</div>
                        <div class="field-description">
                            <span x-show="testResult" x-text="testResult" style="font-weight:bold;"></span>
                        </div>
                    </div>
                    <div class="field-control">
                        <button class="btn btn-field" @click="
                            testResult = 'Testing...';
                            fetch('/api/plugins/deimos_openbao_secrets/health', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                credentials: 'same-origin',
                                body: JSON.stringify({
                                    config: {
                                        url: config.url,
                                        timeout: config.timeout,
                                        tls_verify: config.tls_verify,
                                        tls_ca_cert: config.tls_ca_cert
                                    }
                                })
                            })
                            .then(r => r.json())
                            .then(d => {
                                if (d.ok) {
                                    let s = d.data?.status || 'OK';
                                    let extra = d.data?.sealed ? ' (SEALED)' : '';
                                    testResult = '✅ ' + s + extra;
                                } else {
                                    let msg = d.error || 'Failed';
                                    if (msg.includes('Connection refused') || msg.includes('NewConnectionError')) msg = 'Cannot reach OpenBao. Check URL and ensure it is running.';
                                    else if (msg.includes('timed out')) msg = 'OpenBao did not respond in time. Check network.';
                                    else if (msg.includes('SSL') || msg.includes('certificate')) msg = 'TLS error. Check CA cert or disable verify for dev.';
                                    testResult = '❌ ' + msg;
                                }
                            })
                            .catch(e => { testResult = '❌ ' + e.message; });
                        ">Test Connection</button>
                    </div>
                </div>

                <!-- ============= SECRETS MANAGEMENT ============= -->
                <div x-show="config.enabled && config.url"
                     x-data="{
                        secrets: [],
                        loading: false,
                        error: '',
                        showAdd: false,
                        newKey: '',
                        newValue: '',
                        revealed: {},
                        editing: {},
                        editValues: {},

                        async refresh() {
                            this.loading = true;
                            this.error = '';
                            try {
                                const r = await fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    credentials: 'same-origin',
                                    body: JSON.stringify({action: 'list'})
                                });
                                const d = await r.json();
                                if (d.ok) this.secrets = d.secrets || [];
                                else this.error = d.error || 'Failed to list secrets';
                            } catch(e) { this.error = e.message; }
                            this.loading = false;
                        },

                        async reveal(key) {
                            try {
                                const r = await fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    credentials: 'same-origin',
                                    body: JSON.stringify({action: 'get', key})
                                });
                                const d = await r.json();
                                if (d.ok) {
                                    this.revealed = {...this.revealed, [key]: d.value};
                                    setTimeout(() => {
                                        const r = {...this.revealed};
                                        delete r[key];
                                        this.revealed = r;
                                    }, 5000);
                                } else this.error = d.error;
                            } catch(e) { this.error = e.message; }
                        },

                        startEdit(key) {
                            this.editing = {...this.editing, [key]: true};
                            this.editValues = {...this.editValues, [key]: ''};
                        },

                        cancelEdit(key) {
                            const e = {...this.editing}; delete e[key]; this.editing = e;
                            const v = {...this.editValues}; delete v[key]; this.editValues = v;
                        },

                        async saveEdit(key) {
                            const val = this.editValues[key];
                            if (!val) return;
                            this.error = '';
                            try {
                                const r = await fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    credentials: 'same-origin',
                                    body: JSON.stringify({action: 'set', pairs: [{key, value: val}]})
                                });
                                const d = await r.json();
                                if (d.ok) { this.cancelEdit(key); await this.refresh(); }
                                else this.error = d.error;
                            } catch(e) { this.error = e.message; }
                        },

                        async deleteSecret(key) {
                            if (!confirm('Delete secret "' + key + '"? This cannot be undone.')) return;
                            this.error = '';
                            try {
                                const r = await fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    credentials: 'same-origin',
                                    body: JSON.stringify({action: 'delete', key})
                                });
                                const d = await r.json();
                                if (d.ok) await this.refresh();
                                else this.error = d.error;
                            } catch(e) { this.error = e.message; }
                        },

                        async addNew() {
                            if (!this.newKey.trim()) return;
                            this.error = '';
                            try {
                                const r = await fetch('/api/plugins/deimos_openbao_secrets/secrets', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    credentials: 'same-origin',
                                    body: JSON.stringify({action: 'set', pairs: [{key: this.newKey.trim(), value: this.newValue}]})
                                });
                                const d = await r.json();
                                if (d.ok) {
                                    this.newKey = ''; this.newValue = ''; this.showAdd = false;
                                    await this.refresh();
                                } else this.error = d.error;
                            } catch(e) { this.error = e.message; }
                        }
                     }"
                     >

                    <div class="section-title" style="margin-top:24px;">Secrets Management</div>
                    <div class="section-description">
                        Manage secrets stored in OpenBao. Values are <strong>never exposed to the AI agent</strong>.
                    </div>

                    <div style="display:flex; gap:8px; margin:12px 0;">
                        <button class="btn btn-field" @click="refresh()">Refresh</button>
                        <button class="btn btn-field" @click="showAdd = !showAdd">Add Secret</button>
                    </div>

                    <div x-show="error" style="color:#ff6b6b; margin:8px 0; font-weight:bold;" x-text="error"></div>
                    <div x-show="loading" style="color:#888; margin:8px 0;">Loading secrets...</div>

                    <!-- Add New -->
                    <div x-show="showAdd" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; margin:8px 0;">
                        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                            <input type="text" x-model="newKey" placeholder="KEY_NAME" style="flex:1; min-width:150px;" />
                            <input type="password" x-model="newValue" placeholder="secret value" style="flex:2; min-width:200px;" />
                            <button class="btn btn-field" @click="addNew()">Save</button>
                            <button class="btn btn-field" @click="showAdd=false; newKey=''; newValue=''; ">Cancel</button>
                        </div>
                    </div>

                    <!-- Secrets List -->
                    <div x-show="!loading && secrets.length > 0">
                        <template x-for="secret in secrets" :key="secret.key">
                            <div class="field">
                                <div class="field-label">
                                    <div class="field-title" x-text="secret.key" style="font-family:monospace;"></div>
                                </div>
                                <div class="field-control" style="display:flex; gap:6px; align-items:center;">
                                    <template x-if="!editing[secret.key]">
                                        <div style="display:flex; gap:6px; align-items:center; width:100%;">
                                            <span x-text="revealed[secret.key] || '***'" style="font-family:monospace; flex:1;"></span>
                                            <button class="btn btn-field" @click="reveal(secret.key)" title="Reveal 5s">&#128065;</button>
                                            <button class="btn btn-field" @click="startEdit(secret.key)" title="Edit">&#9998;</button>
                                            <button class="btn btn-field" @click="deleteSecret(secret.key)" title="Delete" style="color:#ff6b6b;">&#128465;</button>
                                        </div>
                                    </template>
                                    <template x-if="editing[secret.key]">
                                        <div style="display:flex; gap:6px; align-items:center; width:100%;">
                                            <input type="password" x-model="editValues[secret.key]" placeholder="new value" style="flex:1;" />
                                            <button class="btn btn-field" @click="saveEdit(secret.key)">Save</button>
                                            <button class="btn btn-field" @click="cancelEdit(secret.key)">Cancel</button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div x-show="!loading && secrets.length === 0 && !error"
                         style="color:#888; margin:12px 0; font-style:italic;">
                        No secrets found. Click "Add Secret" to create one.
                    </div>
                </div>

            </div>
        </template>
    </div>
</body>
</html>
