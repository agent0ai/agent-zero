name: AI Review

on:
  pull_request:
    types: [opened, synchronize, labeled]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only run for PRs from the same repo (reject forks to protect self-hosted runner)
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        startsWith(github.head_ref, 'feature/az-') ||
        startsWith(github.head_ref, 'fix/az-') ||
        contains(github.event.pull_request.labels.*.name, 'ai-review')
      )
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: brandfusion-cmd/ai-review-action@v1
        with:
          api_key: ${{ secrets.CLIPROXY_APIKEY }}
          api_url: ${{ secrets.CLIPROXY_API_URL }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
