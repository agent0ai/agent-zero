<!-- Cowork Panel - Extracted from Settings for tile row -->
<div class="cowork-panel" x-data="coworkPanelData()" x-init="init()">
    <div class="panel-header">
        <h3>Cowork Mode</h3>
        <div class="panel-actions">
            <button class="btn-sm" @click="refresh()" :disabled="loading">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Approval Queue -->
    <div class="approvals-section" x-show="pendingApprovals.length > 0">
        <h4>Pending Approvals (<span x-text="pendingApprovals.length"></span>)</h4>
        <div class="approvals-list">
            <template x-for="approval in pendingApprovals.slice(0, 5)" :key="approval.id">
                <div class="approval-card">
                    <div class="approval-header">
                        <span class="approval-tool" x-text="approval.tool_name"></span>
                        <span class="approval-time" x-text="formatTime(approval.timestamp)"></span>
                    </div>
                    <div class="approval-summary" x-text="truncate(approval.summary || approval.args_preview, 80)"></div>
                    <div class="approval-actions">
                        <button class="btn-approve" @click="approveAction(approval.id)">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
                            Approve
                        </button>
                        <button class="btn-reject" @click="rejectAction(approval.id)">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            Reject
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" x-text="stats.pending || 0"></div>
            <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.approved || 0"></div>
            <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.rejected || 0"></div>
            <div class="stat-label">Rejected</div>
        </div>
    </div>

    <div class="empty-state" x-show="!loading && pendingApprovals.length === 0">
        No pending approvals. Cowork mode requires approval for certain actions.
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="action-btn" @click="refresh()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 4v6h-6M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
            Refresh
        </button>
    </div>
</div>

<script>
function coworkPanelData() {
    return {
        loading: false,
        pendingApprovals: [],
        stats: {},

        async init() {
            await this.refresh();
        },

        async refresh() {
            this.loading = true;
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                const resp = await fetch('/cowork_approvals_list', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': token
                    },
                    body: JSON.stringify({})
                });
                const data = await resp.json();
                const approvals = data.approvals || [];

                this.pendingApprovals = approvals.filter(a => a.status === 'pending');
                this.stats = {
                    pending: this.pendingApprovals.length,
                    approved: approvals.filter(a => a.status === 'approved').length,
                    rejected: approvals.filter(a => a.status === 'rejected').length
                };

                // Update tile badge
                Alpine.store('tileRowStore')?.updateTileBadge('cowork', this.pendingApprovals.length, 'warning');
            } catch (e) {
                console.error('Error loading approvals:', e);
            } finally {
                this.loading = false;
            }
        },

        async approveAction(id) {
            await this.updateApproval(id, 'approved');
        },

        async rejectAction(id) {
            await this.updateApproval(id, 'rejected');
        },

        async updateApproval(id, status) {
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                await fetch('/cowork_approvals_update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': token
                    },
                    body: JSON.stringify({ approval_id: id, status: status })
                });
                await this.refresh();
            } catch (e) {
                console.error('Error updating approval:', e);
            }
        },

        formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        },

        truncate(text, length) {
            if (!text) return '-';
            return text.length > length ? text.substring(0, length) + '...' : text;
        }
    };
}
</script>
