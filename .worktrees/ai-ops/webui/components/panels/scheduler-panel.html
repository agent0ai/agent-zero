<!-- Scheduler Panel - Quick view for tile row -->
<div class="scheduler-panel" x-data="schedulerPanelData()" x-init="init()">
    <div class="panel-header">
        <h3>Scheduler</h3>
        <div class="panel-actions">
            <button class="btn-sm" @click="refresh()" :disabled="loading">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6"/>
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
                Refresh
            </button>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-value" x-text="stats.total || 0"></div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.active || 0"></div>
            <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.running || 0"></div>
            <div class="stat-label">Running</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" x-text="stats.paused || 0"></div>
            <div class="stat-label">Paused</div>
        </div>
    </div>

    <!-- Active Tasks -->
    <div class="tasks-section" x-show="activeTasks.length > 0">
        <h4>Active Tasks</h4>
        <div class="task-list">
            <template x-for="task in activeTasks.slice(0, 5)" :key="task.name">
                <div class="task-card" :class="'task-' + task.state">
                    <div class="task-header">
                        <span class="task-name" x-text="task.name"></span>
                        <span class="task-type" x-text="task.type"></span>
                    </div>
                    <div class="task-details">
                        <span class="task-state" :class="'state-' + task.state" x-text="task.state"></span>
                        <span class="task-schedule" x-text="formatSchedule(task)"></span>
                    </div>
                    <div class="task-actions" x-show="task.state !== 'running'">
                        <button class="btn-xs" @click="runTask(task.name)" title="Run now">
                            <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                        </button>
                        <button class="btn-xs" @click="toggleTask(task)" :title="task.state === 'paused' ? 'Resume' : 'Pause'">
                            <template x-if="task.state === 'paused'">
                                <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                            </template>
                            <template x-if="task.state !== 'paused'">
                                <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                            </template>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Upcoming Runs -->
    <div class="upcoming-section" x-show="upcomingRuns.length > 0">
        <h4>Next Scheduled</h4>
        <div class="upcoming-list">
            <template x-for="run in upcomingRuns.slice(0, 3)" :key="run.name + run.next_run">
                <div class="upcoming-item">
                    <span class="upcoming-name" x-text="run.name"></span>
                    <span class="upcoming-time" x-text="formatNextRun(run.next_run)"></span>
                </div>
            </template>
        </div>
    </div>

    <div class="empty-state" x-show="!loading && tasks.length === 0">
        No scheduled tasks. Create tasks in Settings → Task Scheduler.
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="action-btn" @click="openSettings('scheduler')">
            Manage Tasks
        </button>
    </div>
</div>

<script>
function schedulerPanelData() {
    return {
        loading: false,
        tasks: [],
        stats: {},

        get activeTasks() {
            return this.tasks.filter(t => t.state !== 'idle' || t.type === 'scheduled');
        },

        get upcomingRuns() {
            return this.tasks
                .filter(t => t.next_run && t.state === 'active')
                .sort((a, b) => new Date(a.next_run) - new Date(b.next_run));
        },

        async init() {
            await this.refresh();
        },

        async refresh() {
            this.loading = true;
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                const resp = await fetch('/scheduler_tasks_list', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': token
                    },
                    body: JSON.stringify({})
                });
                const data = await resp.json();
                this.tasks = data.tasks || [];

                // Compute stats
                this.stats = {
                    total: this.tasks.length,
                    active: this.tasks.filter(t => t.state === 'active').length,
                    running: this.tasks.filter(t => t.state === 'running').length,
                    paused: this.tasks.filter(t => t.state === 'paused').length
                };

                // Update tile badge with active count
                Alpine.store('tileRowStore')?.updateTileBadge('scheduler', this.stats.running, 'info');
            } catch (e) {
                console.error('Error loading scheduler tasks:', e);
            } finally {
                this.loading = false;
            }
        },

        async runTask(taskName) {
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                await fetch('/scheduler_task_run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': token
                    },
                    body: JSON.stringify({ name: taskName })
                });
                await this.refresh();
            } catch (e) {
                console.error('Error running task:', e);
            }
        },

        async toggleTask(task) {
            try {
                const token = Alpine.store('csrfStore')?.token || '';
                const newState = task.state === 'paused' ? 'active' : 'paused';
                await fetch('/scheduler_task_update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-Token': token
                    },
                    body: JSON.stringify({ name: task.name, state: newState })
                });
                await this.refresh();
            } catch (e) {
                console.error('Error toggling task:', e);
            }
        },

        formatSchedule(task) {
            if (task.type === 'adhoc') return 'Manual';
            if (task.type === 'planned' && task.planned_times) {
                return task.planned_times.length + ' times';
            }
            if (task.cron) return task.cron;
            return '-';
        },

        formatNextRun(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = date - now;

            if (diff < 0) return 'Due';
            if (diff < 60000) return 'Soon';
            if (diff < 3600000) return Math.round(diff / 60000) + 'm';
            if (diff < 86400000) return Math.round(diff / 3600000) + 'h';
            return date.toLocaleDateString();
        },

        openSettings(tab) {
            Alpine.store('tileRowStore')?.collapseTile();
            Alpine.store('settingsStore')?.setTab(tab);
            document.getElementById('settings')?.click();
        }
    };
}
</script>
