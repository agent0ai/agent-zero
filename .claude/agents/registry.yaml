# Routing Intelligence
routing_intelligence:
  description: "AI-powered agent selection and task routing"

  # Task categorization for automatic routing
  categories:
    planning:
      agents: [product-planner, spec-initializer, spec-shaper, tasks-list-creator]
      confidence_threshold: 0.8

    specification:
      agents: [spec-writer, spec-verifier, contract-designer, integration-architect]
      confidence_threshold: 0.85

    implementation:
      agents: [implementer]
      confidence_threshold: 0.9

    verification:
      agents: [implementation-verifier, full-stack-verifier, spec-verifier]
      confidence_threshold: 0.85

    product_lifecycle:
      agents: [rollout-coordinator, adoption-tracker, deprecation-manager]
      confidence_threshold: 0.8

    customer_success:
      agents: [playbook-engine, health-monitor]
      confidence_threshold: 0.8

    market_intelligence:
      agents: [trend-analyzer, competitor-watcher]
      confidence_threshold: 0.75

    devops:
      agents: [deployment-guard, rollback-sentinel]
      confidence_threshold: 0.9

  # Fallback strategies
  fallback:
    default_agent: master-orchestrator
    max_routing_attempts: 3
    routing_timeout: 30  # seconds

# Performance Baselines
performance_baselines:
  quality_score_threshold: 0.85
  success_rate_threshold: 0.90
  user_satisfaction_threshold: 0.85
  cost_per_invocation_threshold: 0.50
  execution_time_threshold: 600  # seconds

  alerts:
    - condition: quality_score < 0.85
      severity: high
      action: notify_team

    - condition: success_rate < 0.85
      severity: critical
      action: escalate

    - condition: avg_cost_per_invocation > 0.75
      severity: medium
      action: optimize_prompt

