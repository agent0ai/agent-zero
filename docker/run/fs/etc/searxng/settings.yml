# SearXNG settings

use_default_settings:
  engines:
    remove:
      - radio browser
# TODO enable radio_browser when it works again
# currently it crashes on x86 on gethostbyaddr

general:
  debug: false
  instance_name: "SearXNG"

search:
  safe_search: 0
  # autocomplete: 'duckduckgo'
  formats:
    - json
    # - html

server:
  # Is overwritten by ${SEARXNG_SECRET}
  secret_key: "dummy"
  port: 55510
  limiter: false
  image_proxy: false

# Outgoing request limits — prevent overwhelming external search engines
# and reduce disk I/O from cached responses
outgoing:
  request_timeout: 5.0        # Timeout pro Engine (default: 3.0) — etwas großzügiger
  max_request_timeout: 15.0   # Max erlaubter Timeout
  pool_connections: 20         # Max gleichzeitige Verbindungen (default: 100)
  pool_maxsize: 10             # Max Verbindungen pro Host (default: 10)
  # Weniger parallel = weniger Disk-Writes + weniger CAPTCHA-Risiko
  # public URL of the instance, to ensure correct inbound links. Is overwritten
  # by ${SEARXNG_URL}.
  # base_url: http://example.com/location

# redis:
#   # URL to connect redis database. Is overwritten by ${SEARXNG_REDIS_URL}.
#   url: unix:///usr/local/searxng-redis/run/redis.sock?db=0

ui:
  static_use_hash: true

# preferences:
#   lock:
#     - autocomplete
#     - method

enabled_plugins:
  - 'Hash plugin'
  - 'Self Informations'
  - 'Tracker URL remover'
  # - 'Ahmia blacklist'
  # - 'Hostnames plugin'  # see 'hostnames' configuration below
  # - 'Open Access DOI rewrite'

# plugins:
#   - only_show_green_results

# hostnames:
#   replace:
#     '(.*\.)?youtube\.com$': 'invidious.example.com'
#     '(.*\.)?youtu\.be$': 'invidious.example.com'
#   remove:
#     - '(.*\.)?facebook.com$'
#   low_priority:
#     - '(.*\.)?google\.com$'
#   high_priority:
#     - '(.*\.)?wikipedia.org$'

engines:
  - name: radio browser
    engine: radio_browser
    disabled: true
    inactive: true

  - name: ahmia
    disabled: true
    inactive: true

  - name: torch
    disabled: true
    inactive: true

  # --- Anti-CAPTCHA: Engines die schnell blocken deaktivieren ---
  # DuckDuckGo und Brave haben Agent Zero nach wenigen Queries geblockt (CAPTCHA/429).
  # Google und Bing sind robuster mit automatisierten Anfragen.
  - name: duckduckgo
    disabled: true

  - name: brave
    disabled: true

  # Weitere CAPTCHA-anfällige Engines reduzieren
  - name: startpage
    disabled: true

  # Google und Bing bleiben aktiv — die sind am stabilsten für API-artige Nutzung.
  # Wikipedia, Wikidata ebenfalls (kein CAPTCHA-Risiko).
