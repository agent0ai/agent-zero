[pytest]
# Pytest configuration for PMS Hub test suite

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multiple components)
    asyncio: Async tests
    slow: Slow running tests
    mock: Tests using mocks
    smoke: Smoke tests (quick validation)

# Output
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Coverage
[coverage:run]
source = instruments/custom/pms_hub,python/tools,python/api
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
precision = 2
